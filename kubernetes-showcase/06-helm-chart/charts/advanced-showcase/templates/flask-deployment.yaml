apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-flask-deployment
  labels:
    app: {{ .Release.Name }}-flask
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-flask
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-flask
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z -w 2 {{ .Release.Name }}-postgres-service 5432; do echo 'Waiting for database...'; sleep 2; done;"
      containers:
        - name: web
          image: "{{ .Values.image.flask.repository }}:{{ .Values.image.flask.tag }}"
          imagePullPolicy: {{ .Values.image.flask.pullPolicy }}
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgres-service"
            - name: DB_NAME
              value: {{ .Values.database.dbName | quote }}
            - name: DB_USER
              value: {{ .Values.database.dbUser | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: DB_PASSWORD
            # Load extra configurations from ConfigMap
            - name: APP_COLOR
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_COLOR
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ .Release.Name }}-config
                  key: APP_ENV
            # Load secret message from Secret
            - name: SECRET_MESSAGE
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secret
                  key: SECRET_MESSAGE
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
