apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flask-ingress
  annotations:
    # Tell Rancher Desktop's default Traefik controller to route this rule
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: flask-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Direct traffic to the NodePort / internal flask-service on port 80
                name: flask-service
                port:
                  number: 80
