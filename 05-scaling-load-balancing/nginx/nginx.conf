events { worker_connections 1024; }

http {
    upstream flask_app {
        # Docker internal DNS resolves 'web' to all IP addresses of the scaled containers
        # dynamically, load balancing traffic among them automatically.
        server web:5000;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Disable caching for the demo so load-balancing distribution is active on every refresh
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        }
    }
}
